name: deploy-runner

# CD for the pi runner (Trigger.dev task `run-coding-task`). A push to main that touches the runner →
# gate (typecheck + test) → `trigger deploy`. Kept SEPARATE from deploy.yml (which deploys the
# Cloudflare workers) and path-filtered, so each plane ships only when its own code changes — no
# redeploying the runner on a worker- or docs-only change. See docs/decisions/0004-pi-runner-channel.md.
#
# Deploying the runner does NOT run it (runs are dispatched, not auto-triggered) and the
# RUNNER_CONTRACT_VERSION guard turns any control/execution-plane drift into a loud failure, so
# auto-on-merge is safe here.
#
# PREREQUISITE (one-time, GitHub repo Settings → Secrets and variables → Actions):
#   TRIGGER_ACCESS_TOKEN — a Personal Access Token from the Trigger.dev dashboard
#                          (Account → Personal Access Tokens). Without it, the deploy step fails.
#
# NOTE: the CLI↔RPC channel is a RUNTIME env var (HATCHERY_PI_RUNTIME) set in the Trigger dashboard,
# not a deploy-time concern — promoting RPC does not require a redeploy.

on:
  push:
    branches: [main]
    paths:
      - 'trigger/**'
      - 'trigger.config.ts'
      - 'agent-kits/**'
      - 'package-lock.json'
  workflow_dispatch: {}

concurrency:
  group: deploy-runner-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-runner:
    runs-on: ubuntu-latest
    env:
      TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # ── Gate: never deploy red code ──────────────────────────────────────────
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npm test

      # ── Deploy the Trigger.dev runner ────────────────────────────────────────
      # `trigger deploy` builds the bundle (incl. additionalPackages: pi + the capability extensions)
      # and registers run-coding-task. Defaults to the prod environment, matching the manual deploy.
      - name: Deploy runner (trigger.dev)
        run: npx trigger.dev@latest deploy
